<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication Terminal - Memory Match Club Pro</title>
  
  <!-- Google Fonts & FontAwesome Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase Compat CDNs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-dark: #06060c;
      --bg-card: rgba(12, 12, 26, 0.75);
      --border-glow: rgba(0, 240, 255, 0.15);
      --neon-blue: #00f0ff;
      --neon-purple: #bd00ff;
      --neon-pink: #ff007f;
      --gold: #ffd700;
      --success: #39ff14;
      --error: #ff3131;
      --font-display: 'Orbitron', sans-serif;
      --font-primary: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(189, 0, 255, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.12) 0px, transparent 50%);
      background-attachment: fixed;
      color: #ffffff;
      font-family: var(--font-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(18, 16, 35, 0.4) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(18, 16, 35, 0.4) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
    }

    .auth-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
    }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-glow);
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 14px;
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 1px;
      color: #a0a0b0;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .auth-tab.active {
      color: var(--neon-blue);
      border-bottom: 2px solid var(--neon-blue);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0a0b0;
      font-weight: 600;
    }

    .form-control {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-glow);
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--neon-blue);
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
    }

    .pwd-wrapper {
      position: relative;
    }

    .toggle-pwd {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      transition: color 0.3s;
    }

    .toggle-pwd:hover {
      color: var(--neon-blue);
    }

    .btn-cyber {
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-family: var(--font-display);
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .btn-cyber:hover {
      box-shadow: 0 0 20px rgba(189, 0, 255, 0.6);
      transform: translateY(-2px);
    }

    .strength-bar {
      height: 4px;
      background: #111;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      width: 0%;
      height: 100%;
      background: var(--error);
      transition: width 0.3s ease;
    }

    .forgot-link {
      display: inline-block;
      margin-top: 12px;
      color: #a0a0b0;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: var(--neon-pink);
    }

    /* Modal Styling for Password Reset */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="glass-card">
      <div class="auth-tabs">
        <div id="tab-login" class="auth-tab active" onclick="switchTab('login')">LOGIN</div>
        <div id="tab-register" class="auth-tab" onclick="switchTab('register')">REGISTER</div>
      </div>

      <!-- LOGIN NODE FORM -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-control" required placeholder="neo@cybergrid.net">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pwd-wrapper">
            <input type="password" id="login-pwd" class="form-control" required placeholder="••••••••">
            <span class="toggle-pwd" onclick="togglePassword('login-pwd')"><i class="fa-solid fa-eye"></i></span>
          </div>
        </div>
        <button type="submit" class="btn-cyber">Authorize Sign-In</button>
        <div style="text-align: right;">
          <a href="#" class="forgot-link" onclick="openResetModal()">Forgot Access Password?</a>
        </div>
      </form>

      <!-- REGISTRATION NODE FORM -->
      <form id="form-register" onsubmit="handleRegister(event)" style="display: none;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="reg-name" class="form-control" required placeholder="Neo Anderson">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-control" required placeholder="neo@cybergrid.net">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pwd-wrapper">
            <input type="password" id="reg-pwd" class="form-control" onkeyup="evaluateStrength(this.value)" required placeholder="••••••••">
            <span class="toggle-pwd" onclick="togglePassword('reg-pwd')"><i class="fa-solid fa-eye"></i></span>
          </div>
          <div class="strength-bar">
            <div id="strength-fill" class="strength-fill"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="reg-confirm" class="form-control" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="form-label">Referral Code (Optional)</label>
          <input type="text" id="reg-ref" class="form-control" placeholder="REF-XXXXXX">
        </div>
        <button type="submit" class="btn-cyber">Initialize Core Node</button>
      </form>
    </div>
  </div>

  <!-- PASSWORD RESET MODAL -->
  <div id="reset-modal" class="modal-overlay">
    <div class="modal-card">
      <h3 style="font-family: var(--font-display); margin-bottom: 12px; color: var(--neon-blue);">RECOVER KEY CODES</h3>
      <p style="font-size: 0.85rem; color: #a0a0b0; margin-bottom: 16px;">Enter your registered email address to receive password reset instructions.</p>
      <div class="form-group">
        <label class="form-label">Recovery Email</label>
        <input type="email" id="reset-email" class="form-control" placeholder="operator@cybergrid.net">
      </div>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button class="btn-cyber btn-secondary" style="padding: 10px 16px;" onclick="closeResetModal()">Cancel</button>
        <button class="btn-cyber" style="padding: 10px 16px; width: auto;" onclick="sendRecoveryMail()">Send Recovery</button>
      </div>
    </div>
  </div>

  <!-- Core Firebase Configuration -->
  <script src="js/firebase-config.js"></script>

  <script>
    // URL-এর মাধ্যমে সেশন স্টোরেজে সেভ হওয়া রেফারাল কোড স্বয়ংক্রিয়ভাবে ইনপুট বক্সে বসানো হচ্ছে
    window.addEventListener('DOMContentLoaded', () => {
      const storedRef = sessionStorage.getItem('pendingReferral');
      if (storedRef) {
        document.getElementById('reg-ref').value = storedRef;
        document.getElementById('reg-ref').disabled = true; // প্রি-ফিল্ড কোড লক করা হলো
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
      if (tab === 'login') {
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('form-login').style.display = 'block';
        document.getElementById('form-register').style.display = 'none';
      } else {
        document.getElementById('tab-register').classList.add('active');
        document.getElementById('form-login').style.display = 'none';
        document.getElementById('form-register').style.display = 'block';
      }
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function evaluateStrength(val) {
      const progress = document.getElementById('strength-fill');
      let score = 0;
      if (val.length >= 6) score += 30;
      if (/[A-Z]/.test(val)) score += 35;
      if (/[0-9]/.test(val)) score += 35;
      
      progress.style.width = score + '%';
      if (score < 60) {
        progress.style.backgroundColor = 'var(--error)';
      } else if (score < 100) {
        progress.style.backgroundColor = 'var(--gold)';
      } else {
        progress.style.backgroundColor = 'var(--success)';
      }
    }

    // --- LOG IN CONTROLLER ---
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const pwd = document.getElementById('login-pwd').value;

      auth.signInWithEmailAndPassword(email, pwd)
        .then(cred => {
          db.ref(`users/${cred.user.uid}/lastLogin`).set(firebase.database.ServerValue.TIMESTAMP);
          window.location.href = 'home.html';
        })
        .catch(err => alert(err.message));
    }

    // --- REGISTER CONTROLLER ---
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pwd = document.getElementById('reg-pwd').value;
      const confirm = document.getElementById('reg-confirm').value;
      const refCode = document.getElementById('reg-ref').value.trim().toUpperCase();

      if (pwd !== confirm) {
        alert('Password fields mismatch. Please verify passwords.');
        return;
      }

      auth.createUserWithEmailAndPassword(email, pwd)
        .then(cred => {
          const generatedRef = 'REF-' + Math.random().toString(36).substring(2, 8).toUpperCase();
          const userObj = {
            uid: cred.user.uid,
            fullName: name,
            email: email,
            coins: 100, // Welcome reward initialization
            wins: 0,
            losses: 0,
            draws: 0,
            matchesPlayed: 0,
            referralCode: generatedRef,
            referredBy: refCode || "",
            referralCount: 0,
            leaderboardRank: "N/A",
            dailyLoginTime: 0,
            welcomeBonusStatus: true,
            boughtCoins: 0,
            withdrawCoins: 0,
            createdTime: firebase.database.ServerValue.TIMESTAMP,
            lastLogin: firebase.database.ServerValue.TIMESTAMP,
            status: "active",
            role: "user"
          };

          // ১. রিয়েল-টাইম ডাটাবেসে ইউজার ডাটা স্টোর করা
          db.ref(`users/${cred.user.uid}`).set(userObj).then(() => {
            
            // ২. নোটিফিকেশন এন্ট্রি
            const notifKey = db.ref().child(`notifications/${cred.user.uid}`).push().key;
            db.ref(`notifications/${cred.user.uid}/${notifKey}`).set({
              id: notifKey,
              title: "Portal Access Granted",
              message: "Dynamic setup complete. Welcome bonus of 100 Coins has been added to your vault.",
              time: firebase.database.ServerValue.TIMESTAMP,
              read: false
            });

            // ৩. প্রথম ট্রানজ্যাকশন লগ করা
            const txKey = db.ref().child('transactions').push().key;
            db.ref(`transactions/${txKey}`).set({
              txId: txKey,
              uid: cred.user.uid,
              description: "System Welcome Reward",
              amount: 100,
              type: "credit",
              time: firebase.database.ServerValue.TIMESTAMP
            });

            // ৪. রেফারাল প্রসেস ভ্যালিডেশন
            if (refCode) {
              db.ref('users').orderByChild('referralCode').equalTo(refCode).once('value', snapshot => {
                if (snapshot.exists()) {
                  snapshot.forEach(child => {
                    const hostUid = child.key;
                    // হোস্টের রেফারাল তালিকায় এই নতুন ইউজারকে যোগ করা হচ্ছে
                    db.ref(`referrals/${hostUid}/${cred.user.uid}`).set({
                      name: name,
                      completedMatches: 0,
                      rewardClaimed: false
                    });
                    db.ref(`users/${hostUid}/referralCount`).set(firebase.database.ServerValue.increment(1));
                  });
                }
              });
            }

            sessionStorage.removeItem('pendingReferral');
            window.location.href = 'home.html';
          });
        })
        .catch(err => alert(err.message));
    }

    // --- MODAL UTILITIES ---
    function openResetModal() {
      document.getElementById('reset-modal').classList.add('active');
    }

    function closeResetModal() {
      document.getElementById('reset-modal').classList.remove('active');
    }

    function sendRecoveryMail() {
      const email = document.getElementById('reset-email').value.trim();
      if (!email) {
        alert('Please enter an email address.');
        return;
      }
      auth.sendPasswordResetEmail(email)
        .then(() => {
          alert('Verification recovery code sent to your registered email address.');
          closeResetModal();
        })
        .catch(err => alert(err.message));
    }
  </script>
</body>
</html>
